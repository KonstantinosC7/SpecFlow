spring.application.name=RequirementsApp


# =============================================================================
# DATASOURCE \u2014 tells Spring Boot how to connect to your MySQL server
# =============================================================================

# jdbc:mysql://  \u2192 the JDBC protocol for MySQL
# localhost:3306 \u2192 your local MySQL server (default port)
# requirements_db \u2192 the schema/database name that will be created automatically
# createDatabaseIfNotExist=true \u2192 MySQL will create the schema if it doesn't exist yet
# serverTimezone=UTC \u2192 avoids timezone mismatch errors between Java and MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/requirements_db?createDatabaseIfNotExist=true&serverTimezone=UTC

# These must match your MySQL Workbench root credentials
spring.datasource.username=root
spring.datasource.password=root

# The fully-qualified class name of the MySQL JDBC driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =============================================================================
# THYMELEAF \u2014 template engine configuration
# =============================================================================

# Where Spring looks for your .html template files (inside src/main/resources/templates/)
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# =============================================================================
# JPA / HIBERNATE \u2014 ORM configuration
# =============================================================================

# Hibernate 6 (bundled with Spring Boot 3.x) auto-detects the dialect.
# You can explicitly set it for MySQL 8 as below:
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# DDL auto strategy:
#   create-drop  \u2192 drops and recreates all tables on every startup (use only in early dev)
#   update       \u2192 adds/modifies columns if the entity changes, never drops data (use during dev)
#   validate     \u2192 only validates schema matches entities, no changes made (use in production)
#   none         \u2192 do nothing (use when you manage schema with SQL scripts yourself)
# We use 'update' during development so existing data survives restarts.
spring.jpa.hibernate.ddl-auto=update

# Format the printed SQL so it is human-readable
spring.jpa.properties.hibernate.format_sql=true

# Let JPA initialize after the datasource is ready
# Important when using data.sql or schema.sql init files alongside JPA
spring.jpa.defer-datasource-initialization=true

# =============================================================================
# SPRING SECURITY \u2014 default fallback (we override this in WebSecurityConfig)
# =============================================================================
# Disables the auto-generated random password on startup
# (not strictly needed since we provide our own UserDetailsService)
spring.security.user.name=admin
spring.security.user.password=admin

# =============================================================================
# SERVER
# =============================================================================
server.port=8080