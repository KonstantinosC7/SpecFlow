<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Profile')}"></head>
<body>

<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="page-container">
    <div class="page-header">
        <h1>Your Profile</h1>
        <p>Update your account information</p>
    </div>

    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

    <div class="card" style="max-width:560px">
        <!--
            th:object="${user}" binds the form to the User object from the model.
            The hidden "id" field is critical: without it, JPA would try to INSERT
            a new user (id=0) instead of UPDATE the existing one.
        -->
        <form th:action="@{/user/profile/update}" th:object="${user}" method="post">

            <!-- Hidden id to tell JPA this is an UPDATE -->
            <input type="hidden" th:field="*{id}"/>
            <input type="hidden" th:field="*{role}"/>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
                <div class="form-group">
                    <label class="form-label">First Name</label>
                    <input class="form-control" type="text" th:field="*{firstName}" required/>
                </div>
                <div class="form-group">
                    <label class="form-label">Last Name</label>
                    <input class="form-control" type="text" th:field="*{lastName}" required/>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Email</label>
                <input class="form-control" type="email" th:field="*{email}" required/>
            </div>

            <div class="form-group">
                <label class="form-label">Username</label>
                <input class="form-control" type="text" th:field="*{username}" required/>
            </div>

            <div class="form-group">
                <label class="form-label">New Password</label>
                <input class="form-control" type="password" th:field="*{password}"
                       placeholder="Enter new password to change it" required/>
            </div>

            <div style="display:flex;gap:.75rem;margin-top:.5rem">
                <button class="btn btn-primary" type="submit">Save changes</button>
                <a class="btn btn-ghost" th:href="@{/user/dashboard}">Cancel</a>
            </div>
        </form>
    </div>
    
    <div style="margin-top:2.5rem;">
    	<a class="btn btn-ghost" th:href="@{/user/dashboard}">← Back to Dashboard</a>
	</div>
</div>
</body>
</html>
