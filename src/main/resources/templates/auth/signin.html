<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Sign In — ReqApp</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap');
        :root{--bg:#0f1117;--bg-card:#1e2235;--bg-input:#252a3a;--border:#2e3450;--accent:#f5a623;--accent-hover:#e8920a;--accent-muted:rgba(245,166,35,0.12);--text:#e8eaf2;--text-sec:#8890b0;--danger:#e05263;--danger-muted:rgba(224,82,99,0.12);--success:#3ecf8e;--success-muted:rgba(62,207,142,0.12);--font-mono:'Space Mono',monospace;--font-sans:'DM Sans',sans-serif}
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:var(--font-sans);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}

        .auth-box{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 8px 40px rgba(0,0,0,0.5)}
        .auth-logo{font-family:var(--font-mono);font-size:1.3rem;font-weight:700;color:var(--accent);text-decoration:none;display:block;margin-bottom:2rem}
        .auth-logo span{color:#555f80}
        h2{font-family:var(--font-mono);font-size:1.25rem;font-weight:700;margin-bottom:0.4rem;letter-spacing:-0.3px}
        .auth-sub{color:var(--text-sec);font-size:0.875rem;margin-bottom:1.75rem}

        .form-group{margin-bottom:1.1rem}
        .form-label{display:block;font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text-sec);margin-bottom:0.4rem}
        .form-control{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font-sans);font-size:0.9rem;padding:0.65rem 0.9rem;outline:none;transition:all .18s}
        .form-control:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-muted)}

        .btn{display:flex;align-items:center;justify-content:center;width:100%;font-family:var(--font-sans);font-size:0.9rem;font-weight:600;padding:0.7rem 1.25rem;border-radius:8px;border:none;cursor:pointer;text-decoration:none;transition:all .18s;margin-top:0.5rem}
        .btn-primary{background:var(--accent);color:#0f1117}
        .btn-primary:hover{background:var(--accent-hover);transform:translateY(-1px)}

        .alert{padding:0.8rem 1rem;border-radius:8px;font-size:0.85rem;margin-bottom:1.25rem;border:1px solid}
        .alert-danger{background:var(--danger-muted);color:var(--danger);border-color:rgba(224,82,99,.3)}
        .alert-success{background:var(--success-muted);color:var(--success);border-color:rgba(62,207,142,.3)}

        .auth-footer{text-align:center;margin-top:1.5rem;font-size:0.85rem;color:var(--text-sec)}
        .auth-footer a{color:var(--accent);text-decoration:none;font-weight:600}
        .auth-footer a:hover{text-decoration:underline}
        .back-link{display:block;text-align:center;margin-top:1rem;font-size:0.8rem;color:var(--text-sec);text-decoration:none}
        .back-link:hover{color:var(--text)}
    </style>
</head>
<body>

<div class="auth-box">
    <a class="auth-logo" href="/">req<span>/</span>app</a>
    <h2>Welcome back</h2>
    <p class="auth-sub">Sign in to your developer workspace</p>

    <!-- Error from Spring Security (wrong credentials) -->
    <div class="alert alert-danger" th:if="${param.error}">
        Invalid username or password. Please try again.
    </div>

    <!-- Success after registration -->
    <div class="alert alert-success" th:if="${successMessage}" th:text="${successMessage}"></div>

    <!--
        Spring Security handles this POST automatically.
        The action URL must match the loginPage path in WebSecurityConfig.
        Field names must be exactly "username" and "password".
    -->
    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input class="form-control" type="text" id="username" name="username"
                   placeholder="your username" required autofocus/>
        </div>
        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input class="form-control" type="password" id="password" name="password"
                   placeholder="••••••••" required/>
        </div>
        <button class="btn btn-primary" type="submit">Sign in →</button>
    </form>

    <div class="auth-footer">
        Don't have an account? <a th:href="@{/register}">Register here</a>
    </div>
    <a class="back-link" th:href="@{/}">← Back to home</a>
</div>

</body>
</html>
